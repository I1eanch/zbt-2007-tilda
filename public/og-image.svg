  <text
    x="90"
    y="428"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="30"
    font-weight="500"
    fill="#5a6d7e"
  >Бесплатный трёхдневный онлайн-марафон школы «Ресурс»</text>

  <rect x="90" y="474" width="404" height="76" rx="38" fill="url(#ogCta)" />
  <text
    x="292"
    y="522"
    text-anchor="middle"
    font-family="'Montserrat', 'Arial', sans-serif"
    font-size="28"
    font-weight="700"
