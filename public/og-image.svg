    <path
      d="M23 47 C 29 39, 36 30, 45 22"
      fill="none"
      stroke="#ffffff"
      stroke-width="2.6"
      stroke-linecap="round"
    />
  </g>

  <text
    x="90"
    y="132"
    font-family="'Montserrat', 'Arial', sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="4"
    fill="#c06b74"
  >ШКОЛА «РЕСУРС» · НУТРИЦИОЛОГИЯ</text>

  <rect x="90" y="152" width="120" height="5" rx="2.5" fill="url(#ogDivider)" />

  <text
    x="88"
    y="272"
    font-family="'Montserrat', 'Arial', sans-serif"
    font-size="70"
    font-weight="800"
    fill="#2c3e50"
  >Здоровье без таблеток:</text>
  <text
    x="88"
    y="356"
    font-family="'Montserrat', 'Arial', sans-serif"
    font-size="70"
    font-weight="800"
    fill="#2c3e50"
