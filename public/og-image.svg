<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 630"
  width="1200"
  height="630"
  role="img"
  aria-label="Школа «Ресурс» — Здоровье без таблеток: от диагноза к профессии"
>
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="0.18" y2="1">
      <stop offset="0" stop-color="#fdf3f3" />
      <stop offset="0.3" stop-color="#ffffff" />
      <stop offset="0.7" stop-color="#e8f4fc" />
      <stop offset="1" stop-color="#d4eaf7" />
    </linearGradient>
    <linearGradient id="ogDivider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4878f" />
      <stop offset="1" stop-color="#7bbde0" />
    </linearGradient>
    <linearGradient id="ogCta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0627a" />
      <stop offset="1" stop-color="#f0899b" />
    </linearGradient>
    <linearGradient id="ogLeaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4878f" />
      <stop offset="1" stop-color="#7bbde0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogBg)" />

  <!-- decorative accents (aria-hidden via role=img on root) -->
  <circle cx="1070" cy="150" r="230" fill="#e8f4fc" opacity="0.55" />
  <circle cx="1120" cy="470" r="150" fill="#fce8e8" opacity="0.5" />
  <g transform="translate(940 70) scale(4.6)">
    <path
      d="M32 15 C 20 21, 15 34, 20 49 C 35 47, 48 35, 47 17 C 41 15, 36 14, 32 15 Z"
      fill="url(#ogLeaf)"
      opacity="0.9"
